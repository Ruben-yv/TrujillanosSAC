<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis pedidos</title>
    <link rel="stylesheet" href="/css/mis-pedidos.css">
    <link rel="stylesheet" href="/css/admin-menu.css">
    <link rel="stylesheet" href="/css/admin-tools.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/admin-menu.js" defer></script>
</head>
<body>

<header class="navbar">
    <div class="logo">
        <button th:if="${puedeAbrirPanelAdmin}" class="logo-button" type="button" data-admin-menu-toggle aria-label="Abrir modulos internos">
            <img src="/img/payaso_ventas.png" alt="Logo">
        </button>
        <img th:unless="${puedeAbrirPanelAdmin}" src="/img/payaso_ventas.png" alt="Logo">
    </div>

    <div class="search-container">
        <input type="text" placeholder="Que desea hoy?">
    </div>

    <div class="nav-icons">
        <div class="account">
            <i class="fa-regular fa-circle-user"></i>
            <span th:text="${usuarioNombre}">Mi cuenta</span>
            <i class="fa-solid fa-chevron-down"></i>

            <div class="account-menu">
                <a href="#">
                    <i class="fa-regular fa-user"></i>
                    Mi perfil
                </a>
                <a href="/ventas/mis-pedidos">
                    <i class="fa-solid fa-box"></i>
                    Mis pedidos
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Cerrar sesion
                    </button>
                </form>
            </div>
        </div>

        <div class="admin-tools" th:if="${puedeAbrirPanelAdmin}">
            <button class="admin-tools__button" type="button" aria-label="Opciones administrativas">
                <i class="fa-solid fa-gear"></i>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="admin-tools__menu">
                <a href="/admin/productos">
                    <i class="fa-solid fa-box-open"></i>
                    Gestionar productos
                </a>
                <a href="/admin/pedidos">
                    <i class="fa-solid fa-receipt"></i>
                    Gestionar pedidos
                </a>
            </div>
        </div>

        <a class="cart" href="/ventas/carrito" aria-label="Carrito de compras">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</header>

<div th:if="${puedeAbrirPanelAdmin}" class="admin-drawer" id="adminDrawer" aria-hidden="true">
    <div class="admin-drawer__backdrop" data-admin-menu-backdrop></div>
    <aside class="admin-drawer__panel" aria-label="Modulos internos">
        <div class="admin-drawer__header">
            <div>
                <strong>El Trujillano</strong>
                <span th:text="${cargoAdmin}">ADMIN</span>
            </div>
            <button class="admin-drawer__close" type="button" data-admin-menu-close aria-label="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <nav class="admin-drawer__nav">
            <a th:each="modulo : ${modulosAdmin}" th:href="${modulo.url()}">
                <i th:class="${'fa-solid ' + modulo.icono()}"></i>
                <span>
                    <span th:text="${modulo.nombre()}">Modulo</span>
                    <small th:text="${modulo.descripcion()}">Descripcion</small>
                </span>
            </a>
        </nav>
    </aside>
</div>

<main class="orders-page">
    <a class="back-link" href="/ventas/catalogo" aria-label="Volver al catalogo">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <section class="orders-content">
        <h1>Mis pedidos</h1>

        <div class="orders-list" th:if="${!#lists.isEmpty(pedidos)}">
            <article class="order-item" th:each="pedido : ${pedidos}">
                <div class="status-pill">
                    <span th:text="${pedido.estado()}">Recogido</span>
                    <i class="fa-solid fa-check"></i>
                </div>

                <div class="order-card">
                    <time th:text="${#temporals.format(pedido.fechaEmision(), 'dd/MM/yyyy')}">12/04/2026</time>
                    <p>
                        <strong>Productos:</strong>
                        <span th:text="${pedido.productos()}">Acaramhelados (Caja)</span>
                    </p>
                    <span class="order-total">
                        Precio:
                        <strong th:text="${'S/ ' + #numbers.formatDecimal(pedido.total(), 1, 2)}">S/ 0.00</strong>
                    </span>
                </div>
            </article>
        </div>

        <p class="empty-orders" th:if="${#lists.isEmpty(pedidos)}">
            Todavia no tienes pedidos registrados.
        </p>
    </section>
</main>

</body>
</html>
