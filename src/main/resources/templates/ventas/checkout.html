<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Pago</title>
    <link rel="stylesheet" href="/css/checkout.css">
    <link rel="stylesheet" href="/css/admin-menu.css">
    <link rel="stylesheet" href="/css/admin-tools.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/checkout.js" defer></script>
    <script src="/js/admin-menu.js" defer></script>
</head>
<body th:data-cart-key="${carritoKey}">

<header class="navbar">
    <div class="logo">
        <button th:if="${puedeAbrirPanelAdmin}" class="logo-button" type="button" data-admin-menu-toggle aria-label="Abrir modulos internos">
            <img src="/img/payaso_ventas.png" alt="Logo">
        </button>
        <img th:unless="${puedeAbrirPanelAdmin}" src="/img/payaso_ventas.png" alt="Logo">
    </div>

    <div class="search-container">
        <input type="text" placeholder="Que desea hoy?">
    </div>

    <div class="nav-icons">
        <div class="account">
            <i class="fa-regular fa-circle-user"></i>
            <span th:text="${usuarioNombre}">Usuario</span>
            <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="admin-tools" th:if="${puedeAbrirPanelAdmin}">
            <button class="admin-tools__button" type="button" aria-label="Opciones administrativas">
                <i class="fa-solid fa-gear"></i>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="admin-tools__menu">
                <a href="/admin/productos">
                    <i class="fa-solid fa-box-open"></i>
                    Gestionar productos
                </a>
                <a href="/admin/pedidos">
                    <i class="fa-solid fa-receipt"></i>
                    Gestionar pedidos
                </a>
            </div>
        </div>

        <a class="cart" href="/ventas/carrito" aria-label="Carrito de compras">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</header>

<div th:if="${puedeAbrirPanelAdmin}" class="admin-drawer" id="adminDrawer" aria-hidden="true">
    <div class="admin-drawer__backdrop" data-admin-menu-backdrop></div>
    <aside class="admin-drawer__panel" aria-label="Modulos internos">
        <div class="admin-drawer__header">
            <div>
                <strong>El Trujillano</strong>
                <span th:text="${cargoAdmin}">ADMIN</span>
            </div>
            <button class="admin-drawer__close" type="button" data-admin-menu-close aria-label="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <nav class="admin-drawer__nav">
            <a th:each="modulo : ${modulosAdmin}" th:href="${modulo.url()}">
                <i th:class="${'fa-solid ' + modulo.icono()}"></i>
                <span>
                    <span th:text="${modulo.nombre()}">Modulo</span>
                    <small th:text="${modulo.descripcion()}">Descripcion</small>
                </span>
            </a>
        </nav>
    </aside>
</div>

<main class="checkout-page">
    <section class="payment-card">
        <p class="payment-label">Selecciona tu forma de pago preferida</p>

        <label class="payment-option">
            <span class="payment-icon"><i class="fa-solid fa-qrcode"></i></span>
            <span>Yape</span>
            <input type="radio" name="metodoPago" value="YAPE" checked>
        </label>

        <div class="yape-box" id="yapeBox">
            <img src="/img/qr-quezada.jpeg" alt="QR de Yape" onerror="this.closest('.yape-box').classList.add('is-missing')">
            <p>Escanea el QR y luego presiona Pagar para registrar tu pedido.</p>
        </div>

        <label class="payment-option is-disabled">
            <span class="payment-icon"><i class="fa-regular fa-credit-card"></i></span>
            <span>Tarjeta de Credito</span>
            <small>Proximamente</small>
            <input type="radio" name="metodoPago" value="TARJETA" disabled>
        </label>

        <label class="payment-option">
            <span class="payment-icon"><i class="fa-solid fa-money-bill-wave"></i></span>
            <span>Pago en Efectivo</span>
            <input type="radio" name="metodoPago" value="EFECTIVO">
        </label>

        <div class="cash-message" id="cashMessage">
            Gracias por confiar en nosotros. Acerquese a realizar el pago y recoger su pedido.
        </div>
    </section>

    <section class="checkout-summary">
        <div id="checkoutItems"></div>
        <div class="summary-row total">
            <span>Total</span>
            <strong id="checkoutTotal">S/ 0.00</strong>
        </div>
    </section>

    <p class="checkout-error" id="checkoutError"></p>

    <button class="pay-button" id="payButton" type="button">Pagar</button>
</main>

</body>
</html>
