<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="/css/carrito.css">
    <link rel="stylesheet" href="/css/admin-menu.css">
    <link rel="stylesheet" href="/css/admin-tools.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/carrito.js" defer></script>
    <script src="/js/admin-menu.js" defer></script>
</head>
<body th:data-cart-key="${carritoKey}">

<header class="navbar">
    <div class="logo">
        <button th:if="${puedeAbrirPanelAdmin}" class="logo-button" type="button" data-admin-menu-toggle aria-label="Abrir modulos internos">
            <img src="/img/payaso_ventas.png" alt="Logo">
        </button>
        <img th:unless="${puedeAbrirPanelAdmin}" src="/img/payaso_ventas.png" alt="Logo">
    </div>

    <div class="search-container">
        <input type="text" placeholder="Que desea hoy?">
    </div>

    <div class="nav-icons">
        <div class="account">
            <i class="fa-regular fa-circle-user"></i>
            <span th:text="${usuarioNombre}">Usuario 1</span>
            <i class="fa-solid fa-chevron-down"></i>

            <div class="account-menu">
                <a href="#">
                    <i class="fa-regular fa-user"></i>
                    Mi perfil
                </a>
                <a href="/ventas/mis-pedidos">
                    <i class="fa-solid fa-box"></i>
                    Mis pedidos
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Cerrar sesion
                    </button>
                </form>
            </div>
        </div>

        <div class="admin-tools" th:if="${puedeAbrirPanelAdmin}">
            <button class="admin-tools__button" type="button" aria-label="Opciones administrativas">
                <i class="fa-solid fa-gear"></i>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="admin-tools__menu">
                <a href="/admin/productos">
                    <i class="fa-solid fa-box-open"></i>
                    Gestionar productos
                </a>
            </div>
        </div>

        <a class="cart" href="/ventas/carrito" aria-label="Carrito de compras">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</header>

<div th:if="${puedeAbrirPanelAdmin}" class="admin-drawer" id="adminDrawer" aria-hidden="true">
    <div class="admin-drawer__backdrop" data-admin-menu-backdrop></div>
    <aside class="admin-drawer__panel" aria-label="Modulos internos">
        <div class="admin-drawer__header">
            <div>
                <strong>El Trujillano</strong>
                <span th:text="${cargoAdmin}">ADMIN</span>
            </div>
            <button class="admin-drawer__close" type="button" data-admin-menu-close aria-label="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <nav class="admin-drawer__nav">
            <a th:each="modulo : ${modulosAdmin}" th:href="${modulo.url()}">
                <i th:class="${'fa-solid ' + modulo.icono()}"></i>
                <span>
                    <span th:text="${modulo.nombre()}">Modulo</span>
                    <small th:text="${modulo.descripcion()}">Descripcion</small>
                </span>
            </a>
        </nav>
    </aside>
</div>

<main class="cart-page">
    <a class="back-link" href="/ventas/catalogo" aria-label="Volver al catalogo">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <section class="cart-content">
        <div class="cart-list-section">
            <h1>Carrito de Compras</h1>
            <div class="cart-list" id="cartList"></div>
            <p class="empty-cart" id="emptyCart">Tu carrito esta vacio.</p>
        </div>

        <aside class="cart-summary">
            <h2>Resumen de Compra</h2>
            <div class="summary-items" id="summaryItems"></div>
            <div class="summary-row total">
                <span>Total</span>
                <strong id="total">S/ 0.00</strong>
            </div>
            <button id="checkoutButton" type="button">
                Continuar Compra
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </aside>
    </section>
</main>

</body>
</html>
